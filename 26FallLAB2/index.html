        cusdisFrame.style.overflow = 'hidden';
        cusdisFrame.style.background = 'transparent';
        installCommentAlertBridge();

        try {
          var frameDocument = cusdisFrame.contentDocument;
          if (!frameDocument || !frameDocument.head) return;

          if (!frameDocument.getElementById('mirage-cusdis-style')) {
            var stylesheet = frameDocument.createElement('link');
            stylesheet.id = 'mirage-cusdis-style';
            stylesheet.rel = 'stylesheet';
            stylesheet.href = thread.dataset.mirageStyle;
            stylesheet.addEventListener('load', function() {
              measureCusdisFrame();
            });
            frameDocument.head.appendChild(stylesheet);
          }

          if (frameResizeObserver) frameResizeObserver.disconnect();
          if (frameMutationObserver) frameMutationObserver.disconnect();

          var root = frameDocument.getElementById('root');
          if (root && 'ResizeObserver' in window) {
            frameResizeObserver = new ResizeObserver(function() {
              measureCusdisFrame();
            });
            frameResizeObserver.observe(root);
          }

          if (root) {
            frameMutationObserver = new MutationObserver(function() {
              measureCusdisFrame();
            });
            frameMutationObserver.observe(root, {
              childList: true,
              subtree: true,
              attributes: true
            });
          }
        } catch (error) {
          // Keep the official Cusdis resize listener as the safe fallback.
        }

        measureCusdisFrame();
      }

      function findCusdisFrame() {
        var nextFrame = thread.querySelector('iframe');
        if (!nextFrame || nextFrame === cusdisFrame) return;

        cusdisFrame = nextFrame;
        cusdisFrame.addEventListener('load', styleCusdisFrame);
        styleCusdisFrame();
      }

      var threadObserver = new MutationObserver(findCusdisFrame);
      threadObserver.observe(thread, { childList: true, subtree: true });

      window.addEventListener('message', function(event) {
        if (!cusdisFrame || event.source !== cusdisFrame.contentWindow) return;

        try {
          var message = typeof event.data === 'string'
            ? JSON.parse(event.data)
            : event.data;
          if (message && message.from === 'cusdis' && message.event === 'resize') {
            measureCusdisFrame(message.data);
          }
        } catch (error) {
          // Ignore unrelated messages from other embedded content.
        }
      });

      var themeObserver = new MutationObserver(function() {
        var nextSchema = document.documentElement.getAttribute('data-user-color-scheme')
          || document.documentElement.getAttribute('data-default-color-scheme')
          || 'dark';
        if (window.CUSDIS && window.CUSDIS.setTheme) {
          window.CUSDIS.setTheme(nextSchema === 'dark' ? 'dark' : 'light');
        }
      });
      themeObserver.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['data-user-color-scheme']
      });

      Fluid.utils.createScript('https://cusdis.com/js/widget/lang/' + pageLanguage + '.js', function() {
        window.CUSDIS_LOCALE = window.CUSDIS_LOCALE || {};
        window.CUSDIS_LOCALE.email = pageLanguage === 'en' ? 'Email (optional)' : '邮件地址（可选）';
        window.CUSDIS_LOCALE.reply_placeholder = pageLanguage === 'en'
          ? 'Content (comments will be displayed after administrator approval)'
          : '内容（评论经管理员审核通过后方可展示）';

        Fluid.utils.createScript('https://cusdis.com/js/cusdis.es.js', function() {
          findCusdisFrame();
          if (window.CUSDIS && window.CUSDIS.setTheme) {
            window.CUSDIS.setTheme(schema === 'dark' ? 'dark' : 'light');
          }
        });
      });
    });
